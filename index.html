<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="动感口令器">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3043/3043817.png">

    <title>动感八拍口令器</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #0f172a; /* 酷炫深色背景 */
            color: #f8fafc;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        .container {
            background: #1e293b;
            width: 95%;
            max-width: 400px;
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            color: #38bdf8;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .display-box {
            background: #0f172a;
            border-radius: 18px;
            padding: 30px 10px;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }

        .status {
            font-size: 20px;
            color: #94a3b8;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .numbers {
            font-size: 64px;
            font-weight: 900;
            color: #38bdf8;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 6px;
            margin-bottom: 25px;
        }

        .cell {
            aspect-ratio: 1;
            background: #334155;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            color: #94a3b8;
        }

        .cell.active {
            background: #38bdf8;
            color: #0f172a;
            transform: scale(1.15);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.8);
        }

        .control-group {
            background: #0f172a;
            padding: 18px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid #334155;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        input[type="range"] {
            width: 100%;
            height: 12px;
            border-radius: 6px;
            outline: none;
            background: #334155;
        }

        button {
            width: 100%;
            padding: 20px;
            font-size: 26px;
            font-weight: bold;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            color: white;
            transition: background 0.2s;
        }

        .btn-start {
            background: #0284c7;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.4);
        }

        .btn-stop {
            background: #ef4444;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ 爸爸的动感口令器</h1>
    
    <div class="display-box">
        <div class="status" id="status-text">准备运动</div>
        <div class="numbers" id="beat-display">GO!</div>
    </div>

    <div class="grid" id="beat-grid"></div>

    <div class="control-group">
        <div class="label-row">
            <span>运动速度</span>
            <span id="bpm-val" style="color:#38bdf8; font-size:22px;">100 BPM</span>
        </div>
        <input type="range" id="bpm-slider" min="65" max="150" value="100">
    </div>

    <button class="btn-start" id="btn-action">▶ 开始健身</button>
</div>

<script>
    const totalSections = 8;
    const beatsPerSection = 8;
    let currentSection = 1;
    let currentBeat = 1;
    let isPlaying = false;
    let timer = null;

    const gridContainer = document.getElementById('beat-grid');
    const actionBtn = document.getElementById('btn-action');
    const bpmSlider = document.getElementById('bpm-slider');
    const bpmVal = document.getElementById('bpm-val');
    const beatDisplay = document.getElementById('beat-display');
    const statusText = document.getElementById('status-text');

    // Web Audio 接口：用来制造强劲的电子鼓点背景音
    let audioCtx = null;

    // 1. 制造大鼓声 (Kick - 咚) - 浑厚重低音
    function playKick(time) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.frequency.setValueAtTime(120, time);
        osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.3);

        gain.gain.setValueAtTime(0.5, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + 0.3);

        osc.start(time);
        osc.stop(time + 0.3);
    }

    // 2. 制造军鼓声 (Snare - 哒) - 清脆动感
    function playSnare(time) {
        // 白噪声源，用于沙沙的打击感
        const bufferSize = audioCtx.sampleRate * 0.15;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;

        const noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = 'highpass';
        noiseFilter.frequency.value = 1000;

        const noiseEnvelope = audioCtx.createGain();
        
        noise.connect(noiseFilter);
        noiseFilter.connect(noiseEnvelope);
        noiseEnvelope.connect(audioCtx.destination);

        noiseEnvelope.gain.setValueAtTime(0.18, time);
        noiseEnvelope.gain.exponentialRampToValueAtTime(0.01, time + 0.15);

        noise.start(time);
        noise.stop(time + 0.15);
    }

    // 3. 语音播报口令（双管齐下）
    const numWords = ["零", "一", "二", "三", "四", "五", "六", "七", "八"];
    function playVoice(section, beat) {
        let text = beat === 1 ? numWords[section] : numWords[beat];
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        const bpm = parseInt(bpmSlider.value);
        utterance.rate = Math.max(1.1, bpm / 90); // 略微加快说话速度，显得更精神

        window.speechSynthesis.cancel(); 
        window.speechSynthesis.speak(utterance);
    }

    // 4. 核心步进
    function tick() {
        const time = audioCtx.currentTime;

        // 渲染高亮网格
        cells.forEach(c => c.classList.remove('active'));
        const activeCell = document.getElementById(`cell-${currentSection}-${currentBeat}`);
        if (activeCell) activeCell.classList.add('active');

        statusText.innerText = `第 ${currentSection} 个八拍`;
        beatDisplay.innerText = `${currentSection} - ${currentBeat}`;

        // 🔊 鼓点节奏编排：
        // 奇数拍 (1, 3, 5, 7) 敲大鼓 (咚)
        if (currentBeat % 2 !== 0) {
            playKick(time);
        } 
        // 偶数拍 (2, 4, 6, 8) 敲军鼓 (哒)
        else {
            playSnare(time);
        }

        // 同时喊出口令
        playVoice(currentSection, currentBeat);

        currentBeat++;
        if (currentBeat > beatsPerSection) {
            currentBeat = 1;
            currentSection++;
        }
        if (currentSection > totalSections) {
            currentSection = 1; 
        }
    }

    function startTimer() {
        if (timer) clearInterval(timer);
        const bpm = parseInt(bpmSlider.value);
        timer = setInterval(tick, 60000 / bpm);
    }

    // 渲染 8x8 键盘
    const cells = [];
    for (let s = 1; s <= totalSections; s++) {
        for (let b = 1; b <= beatsPerSection; b++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${s}-${b}`;
            cell.innerText = `${s}-${b}`;
            gridContainer.appendChild(cell);
            cells.push(cell);
        }
    }

    actionBtn.addEventListener('click', () => {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        if (!isPlaying) {
            isPlaying = true;
            actionBtn.innerText = "⏸ 暂停健身";
            actionBtn.className = "btn-stop";
            tick();
            startTimer();
        } else {
            isPlaying = false;
            actionBtn.innerText = "▶ 开始健身";
            actionBtn.className = "btn-start";
            clearInterval(timer);
            window.speechSynthesis.cancel();
            statusText.innerText = "已暂停";
        }
    });

    bpmSlider.addEventListener('input', (e) => {
        bpmVal.innerText = `${e.target.value} BPM`;
        if (isPlaying) startTimer();
    });
</script>

</body>
</html>
