<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="极稳口令器">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3043/3043817.png">

    <title>绝对精准八拍口令器</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh;
        }

        .container {
            background: #1e293b;
            width: 100%;
            max-width: 380px;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 20px;
            color: #38bdf8;
            margin-top: 0;
            margin-bottom: 12px;
        }

        .display-box {
            background: #0f172a;
            border-radius: 12px;
            padding: 15px 10px;
            margin-bottom: 12px;
            border: 1px solid #334155;
        }

        .status {
            font-size: 16px;
            color: #94a3b8;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .numbers {
            font-size: 48px;
            font-weight: 900;
            color: #38bdf8;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            line-height: 1;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            color: white;
            transition: background 0.2s;
            margin-bottom: 15px;
        }

        .btn-start {
            background: #0284c7;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.4);
        }

        .btn-stop {
            background: #ef4444;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            margin-bottom: 15px;
        }

        .cell {
            aspect-ratio: 1;
            background: #334155;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #94a3b8;
        }

        .cell.active {
            background: #38bdf8;
            color: #0f172a;
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.8);
        }

        .control-group {
            background: #0f172a;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        input[type="range"] {
            width: 100%;
            height: 10px;
            border-radius: 5px;
            outline: none;
            background: #334155;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ 爸爸的终极极稳口令器</h1>
    
    <div class="display-box">
        <div class="status" id="status-text">高精度硬件级引擎就绪</div>
        <div class="numbers" id="beat-display">GO!</div>
    </div>

    <button class="btn-start" id="btn-action">▶ 开始健身</button>

    <div class="grid" id="beat-grid"></div>

    <div class="control-group">
        <div class="label-row">
            <span>运动速度</span>
            <span id="bpm-val" style="color:#38bdf8; font-size:18px;">100 BPM</span>
        </div>
        <input type="range" id="bpm-slider" min="65" max="150" value="100">
    </div>
</div>

<script>
    const totalSections = 8;
    const beatsPerSection = 8;
    
    let currentSection = 1;
    let currentBeat = 1;
    let isPlaying = false;
    
    let audioCtx = null;
    let nextNoteTime = 0.0;     
    let timerID = null;         

    const lookahead = 25.0;     
    const scheduleAheadTime = 0.1; 

    const gridContainer = document.getElementById('beat-grid');
    const actionBtn = document.getElementById('btn-action');
    const bpmSlider = document.getElementById('bpm-slider');
    const bpmVal = document.getElementById('bpm-val');
    const beatDisplay = document.getElementById('beat-display');
    const statusText = document.getElementById('status-text');

    // 1. 重低音大鼓 (Kick)
    function playKick(time) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.frequency.setValueAtTime(120, time);
        osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.22);

        gain.gain.setValueAtTime(0.5, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + 0.22);

        osc.start(time);
        osc.stop(time + 0.22);
    }

    // 2. 清脆军鼓 (Snare)
    function playSnare(time) {
        const bufferSize = audioCtx.sampleRate * 0.12;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;

        const noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = 'highpass';
        noiseFilter.frequency.value = 1100;

        const noiseEnvelope = audioCtx.createGain();
        
        noise.connect(noiseFilter);
        noiseFilter.connect(noiseEnvelope);
        noiseEnvelope.connect(audioCtx.destination);

        noiseEnvelope.gain.setValueAtTime(0.15, time);
        noiseEnvelope.gain.exponentialRampToValueAtTime(0.01, time + 0.12);

        noise.start(time);
        noise.stop(time + 0.12);
    }

    // 3. 🎯【核心突破】100% 硬件合成清脆电子口令（完全避开苹果系统TTS，确保两台设备音色完全一致、节拍0延迟！）
    // 这里我们合成一个高穿透力的“哔/叮”双音高组合口令，用音调的高低变化来直观代表 1 ~ 8：
    const notes = {
        1: 523.25, // C5
        2: 587.33, // D5
        3: 659.25, // E5
        4: 698.46, // F5
        5: 783.99, // G5
        6: 880.00, // A5
        7: 987.77, // B5
        8: 1046.50 // C6
    };

    function playSynthVoice(beat, time) {
        const osc1 = audioCtx.createOscillator();
        const osc2 = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();

        osc1.connect(gainNode);
        osc2.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        // 使用双振荡器合成一种清脆、饱满的类似电子音叉的声音
        const freq = notes[beat] || 523.25;
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(freq, time);

        osc2.type = 'triangle';
        osc2.frequency.setValueAtTime(freq * 2, time); // 高一个八度的泛音，增加声音的“清脆感”与“活力”

        // 极速淡入淡出，干净利落不拖尾
        gainNode.gain.setValueAtTime(0, time);
        gainNode.gain.linearRampToValueAtTime(0.25, time + 0.02);
        gainNode.gain.exponentialRampToValueAtTime(0.001, time + 0.18);

        osc1.start(time);
        osc1.stop(time + 0.2);
        osc2.start(time);
        osc2.stop(time + 0.2);
    }

    // 4. 精确累加时间
    function nextNote() {
        const bpm = parseInt(bpmSlider.value);
        const secondsPerBeat = 60.0 / bpm;
        nextNoteTime += secondsPerBeat; 

        currentBeat++;
        if (currentBeat > beatsPerSection) {
            currentBeat = 1;
            currentSection++;
        }
        if (currentSection > totalSections) {
            currentSection = 1;
        }
    }

    // 5. 绝对对齐：口令与鼓声在硬件时间轴 time 上强制对齐
    function scheduleNote(s, b, time) {
        // 1. 播放鼓点
        if (b % 2 !== 0) {
            playKick(time);
        } else {
            playSnare(time);
        }

        // 2. 播放绝对同步的口令声音（同属 Web Audio 硬件调度）
        playSynthVoice(b, time);

        // 3. 屏幕 UI 显示同步
        setTimeout(() => {
            if (!isPlaying) return;
            cells.forEach(c => c.classList.remove('active'));
            const activeCell = document.getElementById(`cell-${s}-${b}`);
            if (activeCell) activeCell.classList.add('active');

            statusText.innerText = `第 ${s} 个八拍`;
            beatDisplay.innerText = `${s} - ${b}`;
        }, (time - audioCtx.currentTime) * 1000);
    }

    // 6. 主循环
    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
            scheduleNote(currentSection, currentBeat, nextNoteTime);
            nextNote();
        }
        timerID = setTimeout(scheduler, lookahead);
    }

    // 渲染网格
    const cells = [];
    for (let s = 1; s <= totalSections; s++) {
        for (let b = 1; b <= beatsPerSection; b++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${s}-${b}`;
            cell.innerText = `${s}-${b}`;
            gridContainer.appendChild(cell);
            cells.push(cell);
        }
    }

    actionBtn.addEventListener('click', () => {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        if (!isPlaying) {
            isPlaying = true;
            actionBtn.innerText = "⏸ 暂停健身";
            actionBtn.className = "btn-stop";
            
            currentSection = 1;
            currentBeat = 1;
            nextNoteTime = audioCtx.currentTime + 0.05;
            
            scheduler();
        } else {
            isPlaying = false;
            actionBtn.innerText = "▶ 开始健身";
            actionBtn.className = "btn-start";
            clearTimeout(timerID);
            statusText.innerText = "已暂停";
        }
    });

    bpmSlider.addEventListener('input', (e) => {
        bpmVal.innerText = `${e.target.value} BPM`;
    });
</script>

</body>
</html>
