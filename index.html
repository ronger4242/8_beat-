<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="精准口令器">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3043/3043817.png">

    <title>精准动感八拍口令器</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: #0f172a; 
            color: #f8fafc;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 95vh;
        }

        .container {
            background: #1e293b;
            width: 100%;
            max-width: 380px;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 20px;
            color: #38bdf8;
            margin-top: 0;
            margin-bottom: 12px;
        }

        .display-box {
            background: #0f172a;
            border-radius: 12px;
            padding: 15px 10px;
            margin-bottom: 12px;
            border: 1px solid #334155;
        }

        .status {
            font-size: 16px;
            color: #94a3b8;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .numbers {
            font-size: 48px;
            font-weight: 900;
            color: #38bdf8;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            line-height: 1;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            color: white;
            transition: background 0.2s;
            margin-bottom: 15px;
        }

        .btn-start {
            background: #0284c7;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.4);
        }

        .btn-stop {
            background: #ef4444;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 4px;
            margin-bottom: 15px;
        }

        .cell {
            aspect-ratio: 1;
            background: #334155;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #94a3b8;
        }

        .cell.active {
            background: #38bdf8;
            color: #0f172a;
            transform: scale(1.1);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.8);
        }

        .control-group {
            background: #0f172a;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        input[type="range"] {
            width: 100%;
            height: 10px;
            border-radius: 5px;
            outline: none;
            background: #334155;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ 爸爸的绝对精准口令器</h1>
    
    <div class="display-box">
        <div class="status" id="status-text">高精度时钟就绪</div>
        <div class="numbers" id="beat-display">GO!</div>
    </div>

    <button class="btn-start" id="btn-action">▶ 开始健身</button>

    <div class="grid" id="beat-grid"></div>

    <div class="control-group">
        <div class="label-row">
            <span>运动速度</span>
            <span id="bpm-val" style="color:#38bdf8; font-size:18px;">100 BPM</span>
        </div>
        <input type="range" id="bpm-slider" min="65" max="150" value="100">
    </div>
</div>

<script>
    const totalSections = 8;
    const beatsPerSection = 8;
    
    let currentSection = 1;
    let currentBeat = 1;
    let isPlaying = false;
    
    // 高精度时间调度变量
    let audioCtx = null;
    let nextNoteTime = 0.0;     // 下一个音符播放的精确时间
    let timerID = null;         // 高频预调度检查器
    let preferredVoice = null;

    const lookahead = 25.0;     // 每 25 毫秒检查一次
    const scheduleAheadTime = 0.1; // 提前 0.1 秒把声音预排进系统硬件缓存

    const gridContainer = document.getElementById('beat-grid');
    const actionBtn = document.getElementById('btn-action');
    const bpmSlider = document.getElementById('bpm-slider');
    const bpmVal = document.getElementById('bpm-val');
    const beatDisplay = document.getElementById('beat-display');
    const statusText = document.getElementById('status-text');

    // 锁定声音角色
    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        preferredVoice = voices.find(v => v.lang.includes('zh') && (v.name.includes('Tingting') || v.name.includes('婷婷'))) 
                       || voices.find(v => v.lang.includes('zh'));
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    // 1. 重低音大鼓 (Kick) - 绑定精确时间戳 time
    function playKick(time) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.frequency.setValueAtTime(120, time);
        osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.25);

        gain.gain.setValueAtTime(0.5, time);
        gain.gain.exponentialRampToValueAtTime(0.01, time + 0.25);

        osc.start(time);
        osc.stop(time + 0.25);
    }

    // 2. 清脆军鼓 (Snare) - 绑定精确时间戳 time
    function playSnare(time) {
        const bufferSize = audioCtx.sampleRate * 0.12;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }

        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;

        const noiseFilter = audioCtx.createBiquadFilter();
        noiseFilter.type = 'highpass';
        noiseFilter.frequency.value = 1000;

        const noiseEnvelope = audioCtx.createGain();
        
        noise.connect(noiseFilter);
        noiseFilter.connect(noiseEnvelope);
        noiseEnvelope.connect(audioCtx.destination);

        noiseEnvelope.gain.setValueAtTime(0.18, time);
        noiseEnvelope.gain.exponentialRampToValueAtTime(0.01, time + 0.12);

        noise.start(time);
        noise.stop(time + 0.12);
    }

    // 3. 极速发音（人声）
    const numWords = ["零", "一", "二", "三", "四", "五", "六", "七", "八"];
    function playVoice(section, beat) {
        let text = beat === 1 ? numWords[section] : numWords[beat];
        
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        if (preferredVoice) utterance.voice = preferredVoice;

        const bpm = parseInt(bpmSlider.value);
        utterance.rate = Math.max(1.2, bpm / 80); // 提升发音语速，绝不拖泥带水

        window.speechSynthesis.cancel(); 
        window.speechSynthesis.speak(utterance);
    }

    // 4. 计算下一个拍子的精确时间戳
    function nextNote() {
        const bpm = parseInt(bpmSlider.value);
        const secondsPerBeat = 60.0 / bpm;
        nextNoteTime += secondsPerBeat; // 严格累加时间，零误差

        currentBeat++;
        if (currentBeat > beatsPerSection) {
            currentBeat = 1;
            currentSection++;
        }
        if (currentSection > totalSections) {
            currentSection = 1;
        }
    }

    // 5. 高精度调度核心：提前将音效送入硬件队列
    function scheduleNote(s, b, time) {
        // 音效严格按 time 精确触发
        if (b % 2 !== 0) {
            playKick(time);
        } else {
            playSnare(time);
        }

        // 界面更新与人声唤醒
        setTimeout(() => {
            if (!isPlaying) return;
            cells.forEach(c => c.classList.remove('active'));
            const activeCell = document.getElementById(`cell-${s}-${b}`);
            if (activeCell) activeCell.classList.add('active');

            statusText.innerText = `第 ${s} 个八拍`;
            beatDisplay.innerText = `${s} - ${b}`;

            playVoice(s, b);
        }, (time - audioCtx.currentTime) * 1000);
    }

    // 6. 主轮询循环
    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + scheduleAheadTime) {
            scheduleNote(currentSection, currentBeat, nextNoteTime);
            nextNote();
        }
        timerID = setTimeout(scheduler, lookahead);
    }

    // 渲染 8x8 网格
    const cells = [];
    for (let s = 1; s <= totalSections; s++) {
        for (let b = 1; b <= beatsPerSection; b++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${s}-${b}`;
            cell.innerText = `${s}-${b}`;
            gridContainer.appendChild(cell);
            cells.push(cell);
        }
    }

    actionBtn.addEventListener('click', () => {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }

        if (!isPlaying) {
            isPlaying = true;
            actionBtn.innerText = "⏸ 暂停健身";
            actionBtn.className = "btn-stop";
            
            // 重置精准时间戳
            currentSection = 1;
            currentBeat = 1;
            nextNoteTime = audioCtx.currentTime + 0.05;
            
            scheduler();
        } else {
            isPlaying = false;
            actionBtn.innerText = "▶ 开始健身";
            actionBtn.className = "btn-start";
            clearTimeout(timerID);
            window.speechSynthesis.cancel();
            statusText.innerText = "已暂停";
        }
    });

    bpmSlider.addEventListener('input', (e) => {
        bpmVal.innerText = `${e.target.value} BPM`;
    });
</script>

</body>
</html>
